<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Uni-ID - Sistema de Identidad Única">
    <title>Uni-ID | Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; }
        .video-bg::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.75); backdrop-filter: blur(2px); }
        .login-page { background: transparent !important; }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="video-bg">
        <video autoplay muted loop playsinline id="bgVideo"><source src="Video Project.mp4" type="video/mp4"></video>
    </div>
    <div class="login-page">
        <div class="login-card card" id="loginCard" style="background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);">
            <div class="login-header">
                <div class="login-logos">
                    <img src="logo1.png" alt="UPM">
                    <img src="logo2.png" alt="UTyP">
                </div>
                <h1 style="font-size:1.8rem;margin-bottom:8px;"><span class="text-gradient">Uni-ID</span></h1>
                <p class="text-muted text-sm">Sistema de Identidad Única</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="emailInput">Correo electrónico</label>
                    <input type="email" id="emailInput" class="form-input" placeholder="correo@ejemplo.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="passwordInput">Contraseña</label>
                    <input type="password" id="passwordInput" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-full" id="btnLogin">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" /></svg>
                    Iniciar Sesión
                </button>
            </form>
            <div style="text-align:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;justify-content:center;gap:16px;">
                <a href="admin/login.html" class="text-sm" style="color:var(--text-muted);" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">Administrador</a>
                <a href="docente/login.html" class="text-sm" style="color:var(--text-muted);" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">Docente</a>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
