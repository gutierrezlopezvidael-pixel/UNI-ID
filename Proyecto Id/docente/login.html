<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-ID | Acceso Docente</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="login-page">
        <div class="login-card card">
            <div class="login-header">
                <div class="login-logos">
                    <img src="../logo1.png" alt="UPM">
                    <img src="../logo2.png" alt="UTyP">
                </div>
                <h1 style="font-size:1.6rem; margin-bottom:8px;">
                    <span class="text-gradient">Panel Docente</span>
                </h1>
                <p class="text-muted text-sm">Calificaciones y grupos asignados</p>
            </div>

            <form id="docenteLoginForm" onsubmit="handleDocenteLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="docenteUser">Usuario</label>
                    <input type="text" id="docenteUser" class="form-input" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="docentePass">Contraseña</label>
                    <div style="position:relative;">
                        <input type="password" id="docentePass" class="form-input" placeholder="Ingresa tu contraseña" required autocomplete="current-password" style="padding-right:48px;">
                        <button type="button" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;" title="Mostrar/ocultar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-full" id="btnDocenteLogin">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                    </svg>
                    Acceder
                </button>
            </form>

            <div style="text-align:center; margin-top:28px; padding-top:20px; border-top:1px solid var(--border);">
                <a href="../index.html" class="text-sm" style="color:var(--text-muted); display:inline-flex; align-items:center; gap:4px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
                    Volver al inicio
                </a>
            </div>
        </div>
    </div>

    <script>
        function showToast(msg, type) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast toast-' + (type || 'info');
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        function togglePassword() {
            const p = document.getElementById('docentePass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        async function handleDocenteLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnDocenteLogin');
            const usuario = document.getElementById('docenteUser').value.trim();
            const password = document.getElementById('docentePass').value;

            if (!usuario || !password) {
                showToast('Completa todos los campos', 'warning');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span style="animation:pulse 1s infinite">Verificando...</span>';

            try {
                const res = await fetch('../api/docente_login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('docente', JSON.stringify(data.docente));
                    showToast('Bienvenido, ' + data.docente.nombre, 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    showToast(data.error || 'Credenciales incorrectas', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" /></svg> Acceder';
                }
            } catch (err) {
                showToast('Error de conexión', 'error');
                btn.disabled = false;
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" /></svg> Acceder';
            }
        }
    </script>
</body>
</html>
